<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Lofi Pets app icon: cozy tortoise on a warm rounded square -->
  <rect x="32" y="32" width="960" height="960" rx="224" fill="#f3e7d3"/>
  <rect x="32" y="32" width="960" height="960" rx="224" fill="none" stroke="#e0cdb0" stroke-width="16"/>

  <!-- ground shadow -->
  <ellipse cx="512" cy="768" rx="300" ry="42" fill="#e0cdb0" opacity="0.6"/>

  <!-- back leg -->
  <rect x="580" y="690" width="80" height="80" rx="24" fill="#7db152"/>
  <!-- front leg -->
  <rect x="330" y="690" width="80" height="80" rx="24" fill="#7db152"/>

  <!-- body underside -->
  <rect x="300" y="640" width="400" height="80" rx="32" fill="#8fc264"/>

  <!-- shell -->
  <path d="M 240 700 A 272 272 0 0 1 784 700 Z" fill="#8b5a2b"/>
  <path d="M 300 700 A 212 212 0 0 1 724 700 Z" fill="#a06c38"/>
  <!-- shell pattern -->
  <path d="M 430 520 h 164 l 50 90 h -264 Z" fill="#8b5a2b"/>
  <rect x="470" y="440" width="84" height="70" rx="16" fill="#8b5a2b"/>

  <!-- head -->
  <circle cx="790" cy="600" r="86" fill="#7db152"/>
  <path d="M 790 686 a 86 86 0 0 0 86 -86 l -86 0 Z" fill="#6d9c47"/>
  <!-- eye -->
  <circle cx="812" cy="580" r="14" fill="#2c2a33"/>
  <!-- cheek -->
  <ellipse cx="830" cy="618" rx="16" ry="9" fill="#f5b8c8" opacity="0.85"/>

  <!-- music note -->
  <g fill="#c15f3c">
    <rect x="742" y="330" width="16" height="120" rx="8" transform="rotate(12 750 390)"/>
    <circle cx="726" cy="452" r="30"/>
    <rect x="742" y="330" width="70" height="26" rx="12" transform="rotate(12 750 390)"/>
  </g>
</svg>
